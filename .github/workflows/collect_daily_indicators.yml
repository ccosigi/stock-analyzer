
name: 📊 Daily Market Indicators Collector

on:
  schedule:
    # 매일 오전 7시 (KST) = UTC 22:00 (전날) → 미장 마감 후 수집
    # 미국 동부시간 오후 4시 마감 기준, 데이터 반영까지 여유 있게 설정
    - cron: '0 22 * * 1-5'   # 월~금 UTC 22:00 (KST 07:00)
  workflow_dispatch:          # 수동 실행 버튼 (테스트용)

jobs:
  collect-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          pip install yfinance pandas requests beautifulsoup4

      - name: 📊 Collect market indicators
        run: python collect_daily_indicators.py

      - name: 💾 Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/market_indicators.csv
          # 변경사항 있을 때만 커밋 (데이터 없는 날 빈 커밋 방지)
          git diff --staged --quiet || git commit -m "📊 Daily indicators update: $(date +'%Y-%m-%d')"
          git push

